# AI服务统一配置文件
# 本文件用于配置所有AI模型和服务提供商

# Agent模型映射 - 指定每个Agent使用哪个模型
agent_model_mapping:
  concept_planner: "glm-4.5"        # 概念规划 - 使用最新GLM-4.5
  script_writer: "glm-4.5"          # 脚本写作 - 使用GLM-4.5
  quality_checker: "glm-4.5-air"    # 质量检查 - 使用轻量版本即可
  audio_generator: "glm-4.5"        # 音频生成 - 需要理解内容，使用GLM-4.5
  image_generator: "cogview-4"       # 图像生成 - 使用最新CogView-4
  default: "glm-4.5"                # 默认模型

# AI服务提供商配置
providers:
  zhipu:
    default_model: "glm-4.5"        # 智谱AI默认使用最新GLM-4.5
    enabled: true
    rate_limit: 100                 # 每分钟请求限制
    timeout: 120                    # 请求超时时间（秒）
  
  openai:
    default_model: "gpt-4"
    enabled: true
    rate_limit: 60
    timeout: 60
  
  kimi:
    default_model: "kimi-k2"
    enabled: true
    rate_limit: 50
    timeout: 120

# 模型具体配置
models:
  # GLM-4.5 系列模型 (最新一代)
  glm-4.5:
    temperature: 0.7
    max_tokens: 8000              # GLM-4.5支持更大的上下文
    enabled: true
    timeout: 120
    
  glm-4.5-air:
    temperature: 0.7
    max_tokens: 4000              # Air版本轻量化
    enabled: true
    timeout: 90                   # 轻量版本速度更快
  
  # GLM-4 系列模型 (保留兼容性)
  glm-4:
    temperature: 0.7
    max_tokens: 2000
    enabled: true
    timeout: 60
    
  glm-4-plus:
    temperature: 0.7
    max_tokens: 4000
    enabled: true
    timeout: 120
    
  glm-4-0520:
    temperature: 0.6              # 稍微降低随机性，获得更一致的结果
    max_tokens: 4000
    enabled: true
    timeout: 120
    
  glm-4-long:
    temperature: 0.7
    max_tokens: 8000              # 长上下文模型
    enabled: true
    timeout: 180
    
  glm-4-flashx:
    temperature: 0.8              # 快速模型可以稍微提高创造性
    max_tokens: 2000
    enabled: true
    timeout: 30                   # 快速模型，超时时间短
    
  # OpenAI模型
  gpt-4:
    temperature: 0.7
    max_tokens: 4000
    enabled: true
    timeout: 60
    
  gpt-3.5-turbo:
    temperature: 0.8
    max_tokens: 2000
    enabled: true
    timeout: 30
    
  # Kimi模型
  kimi-k2:
    temperature: 0.7
    max_tokens: 8000              # Kimi支持长上下文
    enabled: true
    timeout: 120
  
  # CogView 图像生成模型
  cogview-3:
    enabled: true
    timeout: 180                  # 图像生成需要更多时间
    
  cogview-3-plus:
    enabled: true
    timeout: 300                  # Plus版本可能需要更多时间
    
  cogview-4:
    enabled: true
    timeout: 240                  # CogView-4 最新版本

# 环境特定配置
environments:
  development:
    # 开发环境使用更快的轻量模型
    agent_model_mapping:
      concept_planner: "glm-4.5-air"
      script_writer: "glm-4.5-air"
      quality_checker: "glm-4.5-air"
      default: "glm-4.5-air"
  
  production:
    # 生产环境使用最好的GLM-4.5模型
    agent_model_mapping:
      concept_planner: "glm-4.5"
      script_writer: "glm-4.5"
      quality_checker: "glm-4.5-air"
      audio_generator: "glm-4.5"
      default: "glm-4.5"

# 成本控制配置
cost_control:
  daily_token_limit: 1000000      # 每日token限制
  model_token_costs:              # 每千token成本（人民币分）
    glm-4.5: 30                   # GLM-4.5 最新模型
    glm-4.5-air: 15               # GLM-4.5-air 轻量版本
    glm-4: 10
    glm-4-plus: 20
    glm-4-0520: 25
    gpt-4: 200
    gpt-3.5-turbo: 20
  
  alert_thresholds:
    daily_cost: 100               # 日成本告警阈值（人民币元）
    single_request: 10            # 单次请求告警阈值（人民币元）

# 质量配置
quality:
  auto_fallback: true             # 启用自动降级
  retry_attempts: 3               # 失败重试次数
  quality_check_enabled: true     # 启用质量检查
  
  fallback_chains:                # 降级链
    - primary: "glm-4.5"
      fallback: "glm-4.5-air"
    - primary: "glm-4.5-air"
      fallback: "glm-4-plus"
    - primary: "glm-4-plus" 
      fallback: "glm-4"
    - primary: "gpt-4"
      fallback: "gpt-3.5-turbo"