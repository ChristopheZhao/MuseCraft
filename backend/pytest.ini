[tool:pytest]
# Pytest configuration for Short Video Maker integration tests

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    integration: Integration tests that test component interactions
    performance: Performance and benchmark tests
    load: Load testing with multiple concurrent users
    e2e: End-to-end workflow tests
    slow: Tests that take more than 10 seconds to run
    websocket: WebSocket communication tests
    ai_services: Tests that interact with AI service APIs
    database: Tests that require database operations
    redis: Tests that require Redis operations
    celery: Tests that require Celery task queue

# Async support
asyncio_mode = auto

# Output options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=app
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-fail-under=80
    --junit-xml=test-results.xml

# Minimum version
minversion = 7.0

# Test timeouts
timeout = 300
timeout_method = thread

# Parallel execution
# -n auto  # Uncomment to enable parallel execution

# Environment variables for testing
env = 
    TESTING = true
    DEBUG = false
    DATABASE_URL = sqlite+aiosqlite:///./test.db
    REDIS_URL = redis://localhost:6379/15
    CELERY_BROKER_URL = redis://localhost:6379/15
    CELERY_RESULT_BACKEND = redis://localhost:6379/15
    LOG_LEVEL = ERROR

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*unclosed.*:ResourceWarning

# Required plugins
required_plugins =
    pytest-asyncio
    pytest-cov
    pytest-timeout
    pytest-mock
    pytest-xdist