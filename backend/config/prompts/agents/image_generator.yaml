  scene_generation_strategy_analysis:
    name: "场景生成策略分析"
    description: "使用LLM智能分析场景间的连续性，决定图像生成策略"
    variables:
      - "current_scene_number"
      - "current_scene_title"
      - "current_scene_description"
      - "current_scene_narrative"
      - "current_scene_initial_state"
      - "previous_scene_number"
      - "previous_scene_title"
      - "previous_scene_description"
      - "previous_scene_narrative"
      - "previous_scene_final_state"
      - "user_prompt"
      - "video_style"
      - "overall_concept"
      - "project_duration"
    template: |
      你是专业的视频制作顾问。你的任务是判断当前场景是否是前一场景中"同一物体/角色的状态演进过程"，需要使用前一场景的最后一帧来保持视觉连续性。

      ⚠️  **重要**：镜头切换、场景转换、视角变化都是正常的，不需要连续性。只有"状态演进"才需要。

      ## 项目背景
      - **用户需求**: {{ user_prompt }}
      - **项目风格**: {{ video_style }}
      - **总时长**: {{ project_duration }}秒
      - **整体概念**: {{ overall_concept }}

      ## 前一场景信息 (场景 {{ previous_scene_number }})
      - **标题**: {{ previous_scene_title }}
      - **描述**: {{ previous_scene_description }}
      - **叙事内容**: {{ previous_scene_narrative }}
      - **最终状态**: {{ previous_scene_final_state }}

      ## 当前场景信息 (场景 {{ current_scene_number }})
      - **标题**: {{ current_scene_title }}
      - **描述**: {{ current_scene_description }}
      - **叙事内容**: {{ current_scene_narrative }}
      - **初始状态**: {{ current_scene_initial_state }}

      ## 🎯 核心判断标准

      ### ✅ **需要连续性 ("continue_from_previous")** - 状态演进场景:
      1. **形态变化过程** - 如：金丹→人形→完整人形、花苞→开花→盛开
      2. **能量变化过程** - 如：能量聚集→爆发→扩散、光芒微弱→增强→耀眼  
      3. **表情/情绪渐变** - 如：平静→惊讶→震惊、痛苦→领悟→喜悦
      4. **动作连续过程** - 如：起身→走动→坐下、举手→挥舞→放下
      5. **物体状态演进** - 如：破裂→碎裂→重组、燃烧→熄灭→烟散

      ### ❌ **不需要连续性 ("new_image")** - 正常镜头切换:
      1. **视角/镜头转换** - 如：外景→内心世界、全景→特写、远景→近景
      2. **场景/地点切换** - 如：室内→室外、山峰→平原、天空→地面  
      3. **时间跳跃** - 如："三天后"、"与此同时"、"回忆中"
      4. **主体切换** - 如：从A角色→B角色、从人→动物→环境

      ## 🔍 关键判断逻辑
      
      **STEP 1: 识别核心主体**
      - 前一场景的主要对象是什么？（人物、金丹、能量、表情等）
      - 当前场景的主要对象是什么？
      
      **STEP 2: 判断是否为同一主体**
      - 如果是同一个金丹：从"稳定"→"显现人形" = 状态演进 ✅
      - 如果是同一个人物：从"平静"→"震惊" = 状态演进 ✅  
      - 如果是不同主体：从"人物"→"另一个人物" = 镜头切换 ❌
      
      **STEP 3: 判断变化类型**  
      - **状态演进**: 同一对象的逐渐变化（形态、表情、能量强度）
      - **镜头切换**: 视角转换、空间变化、完全不同的对象
      
      ## 💡 **决策要点**
      - **相同主体 + 状态变化** → `continue_from_previous` 
      - **不同主体 OR 空间切换** → `new_image`
      
      **特殊说明**: 即使是"体内视角"，如果描述的是同一个金丹的不同状态，仍然是状态演进！

      ## 输出要求

      请以 JSON 格式返回你的分析结果：

      ```json
      {
        "strategy": "new_image" | "continue_from_previous",
        "reasoning": "详细的分析理由和依据",
        "confidence_score": 0.85,
        "analysis_dimensions": {
          "spatial_continuity": {
            "consistent": true,
            "reasoning": "空间连续性的具体分析"
          },
          "temporal_continuity": {
            "consistent": false,
            "reasoning": "时间连续性的具体分析"
          },
          "subject_continuity": {
            "consistent": true,
            "reasoning": "主体连续性的具体分析"
          },
          "narrative_continuity": {
            "consistent": true,
            "reasoning": "叙事连续性的具体分析"
          },
          "visual_continuity": {
            "consistent": true,
            "reasoning": "视觉连续性的具体分析"
          }
        },
        "continuity_requirements": {
          "key_elements_to_maintain": ["需要保持的关键元素"],
          "state_progression_notes": "状态变化的说明"
        }
      }
      ```

      请基于上述分析维度和决策标准，给出你的专业判断。

