per_agent:
  video_generator:
    functions:
      - name: video_generation.generate_with_continuity
        params:
          duration:
            allowed_values: ${provider.duration_capabilities}
            on_violation: warn
          image_url:
            allow_schemes: [http, https]
            on_violation: warn
          previous_video_url:
            allow_schemes: [http, https]
            on_violation: warn
          continuity_frame:
            allow_schemes: [http, https]
            on_violation: warn
  image_generator:
    functions:
      - name: image_generation.generate_with_autoprompt
        params:
          size:
            allowed_values: ["1024x1024", "1024x1792", "1792x1024"]
            on_violation: warn

