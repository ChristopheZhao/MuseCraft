# Function Call policies (minimal, config over constants)

# Global defaults can live here; per-agent overrides under per_agent.<agent_name>

# Example: expose tools/actions (already supported by code). Keep minimal here.
tools: {}

# Stage policy: control plan/act exposure at schema level (no tool names here).
fc_stage_policy:
  default: auto
  react_rules: []

per_agent:
  image_generator:
    fc_stage_policy:
      default: auto
      react_rules: []
  video_generator:
    tools:
      expose: true
      allowed_actions:
        - video_generation.generate_with_continuity
        - image_generation.generate_with_autoprompt
        - scene_continuity_preparation.prepare_scene_input
        - consistency_tool.get_prompt_assets
    fc_stage_policy:
      default: auto
      react_rules: []
