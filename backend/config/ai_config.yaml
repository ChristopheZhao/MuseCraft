# AI服务统一配置文件
# 本文件用于配置所有AI模型和服务提供商

# Agent模型映射 - 指定每个Agent使用哪个模型
agent_model_mapping:
  concept_planner: "glm-default"    # 概念规划 - 使用默认主模型
  script_writer: "glm-default"      # 脚本写作 - 使用默认主模型
  quality_checker: "glm-light"      # 质量检查 - 使用轻量版本即可
  audio_generator: "glm-default"    # 音频生成 - 需要理解内容，使用默认主模型
  image_generator: "cogview-4"       # 图像生成 - 使用最新CogView-4
  default: "glm-default"            # 默认模型

# Agent备用模型映射（兜底模型，不是常规分支）
agent_fallback_model_mapping:
  concept_planner: "glm-light"

# Tool模型映射 - 指定特定工具使用哪个模型（可选）
tool_model_mapping:
  role_analysis_tool: "glm-light"     # 角色分析工具默认使用轻量高性价比模型
  concept_generation_tool: "glm-default"  # 概念生成工具偏向更强模型
  scene_continuity_analysis_tool: "glm-light"  # 连续性分析工具轻量即可
  intelligent_scene_planning: "glm-light"      # 智能场景规划更偏速度
  narrative_structure_generation_tool: "glm-light"  # 叙事结构生成轻量即可
  parameter_optimization: "glm-light"          # 参数优化工具（时长推荐等）
  image_generation: "glm-light"                # 图像工具中的提示词生成等文本能力
  quality_analysis_tool: "glm-light"           # 质量分析
  scene_script_generation_tool: "glm-default"  # 单场景脚本生成
  script_generation_tool: "glm-default"        # 多场景脚本生成（工具级映射）

# Tool提供商映射（可选）：用于指定具体工具优先使用的服务商（zhipu/doubao/...）
tool_provider_mapping:
  image_generation: "doubao"            # 图像生成优先使用 Doubao Seedream（需配置 DOUBAO_API_KEY）
  video_generation_tool: "doubao"       # 视频生成优先使用 Doubao Seedance（需配置 DOUBAO_API_KEY）

# Agent默认思维链模式（按职能先验）：planning=thinking，execution=standard
agent_thinking_mode:
  concept_planner: "thinking"
  script_writer: "thinking"
  image_generator: "standard"
  video_generator: "standard"
  video_composer: "standard"
  quality_checker: "standard"
  audio_generator: "standard"
  default: "standard"

# AI服务提供商配置
providers:
  zhipu:
    default_model: "glm-default"   # 智谱AI默认使用主模型
    enabled: true
    rate_limit: 100                 # 每分钟请求限制
    timeout: 120                     # 请求超时时间（秒）- 小于Agent总超时以便触发回退
  
  openai:
    default_model: "gpt-4"
    enabled: true
    rate_limit: 60
    timeout: 60
  
  kimi:
    default_model: "kimi-k2"
    enabled: true
    rate_limit: 50
    timeout: 120

# 模型具体配置
models:
  # GLM-4.5 系列模型 (最新一代)
  glm-4.5:
    temperature: 0.7
    max_tokens: 24000             # GLM-4.5支持更大的上下文
    enabled: true
    timeout: 120                   # 小于Agent总超时（240s），确保主调先于Agent层判定
    
  glm-4.5-air:
    temperature: 0.7
    max_tokens: 12000              # Air版本轻量化
    enabled: true
    timeout: 120                  # 与主模型对齐，避免过早超时导致JSON不稳定
  
  # GLM-4 系列模型 (保留兼容性)
  glm-4:
    temperature: 0.7
    max_tokens: 2000
    enabled: true
    timeout: 60
    
  glm-4-plus:
    temperature: 0.7
    max_tokens: 4000
    enabled: true
    timeout: 120
    
  glm-4-0520:
    temperature: 0.6              # 稍微降低随机性，获得更一致的结果
    max_tokens: 4000
    enabled: true
    timeout: 120
    
  glm-4-long:
    temperature: 0.7
    max_tokens: 8000              # 长上下文模型
    enabled: true
    timeout: 180
    
  glm-4-flashx:
    temperature: 0.8              # 快速模型可以稍微提高创造性
    max_tokens: 2000
    enabled: true
    timeout: 30                   # 快速模型，超时时间短
    
  # OpenAI模型
  gpt-4:
    temperature: 0.7
    max_tokens: 4000
    enabled: true
    timeout: 60
    
  gpt-3.5-turbo:
    temperature: 0.8
    max_tokens: 2000
    enabled: true
    timeout: 30
    
  # Kimi模型
  kimi-k2:
    temperature: 0.7
    max_tokens: 8000              # Kimi支持长上下文
    enabled: true
    timeout: 120
  
  # CogView 图像生成模型
  cogview-3:
    enabled: true
    timeout: 180                  # 图像生成需要更多时间
    
  cogview-3-plus:
    enabled: true
    timeout: 300                  # Plus版本可能需要更多时间
    
  cogview-4:
    enabled: true
    timeout: 240                  # CogView-4 最新版本

# 环境特定配置
environments:
  development:
    # 开发环境使用更快的轻量模型
    agent_model_mapping:
      concept_planner: "glm-light"
      script_writer: "glm-light"
      quality_checker: "glm-light"
      default: "glm-light"
    tool_model_mapping:
      role_analysis_tool: "glm-light"
      concept_generation_tool: "glm-light"
      scene_continuity_analysis_tool: "glm-light"
      intelligent_scene_planning: "glm-light"
      narrative_structure_generation_tool: "glm-light"
      parameter_optimization: "glm-light"
      image_generation: "glm-light"
      quality_analysis_tool: "glm-light"
      scene_script_generation_tool: "glm-light"
      script_generation_tool: "glm-light"
  
  production:
    # 生产环境使用默认主模型
    agent_model_mapping:
      concept_planner: "glm-default"
      script_writer: "glm-default"
      quality_checker: "glm-light"
      audio_generator: "glm-default"
      default: "glm-default"
    tool_model_mapping:
      role_analysis_tool: "glm-default"
      concept_generation_tool: "glm-default"
      scene_continuity_analysis_tool: "glm-default"
      intelligent_scene_planning: "glm-default"
      narrative_structure_generation_tool: "glm-default"
      parameter_optimization: "glm-default"
      image_generation: "glm-default"
      quality_analysis_tool: "glm-default"
      scene_script_generation_tool: "glm-default"
      script_generation_tool: "glm-default"

# 成本控制配置
cost_control:
  daily_token_limit: 1000000      # 每日token限制
  model_token_costs:              # 每千token成本（人民币分）
    glm-4.5: 30                   # GLM-4.5 最新模型
    glm-4.5-air: 15               # GLM-4.5-air 轻量版本
    glm-4: 10
    glm-4-plus: 20
    glm-4-0520: 25
    gpt-4: 200
    gpt-3.5-turbo: 20
  
  alert_thresholds:
    daily_cost: 100               # 日成本告警阈值（人民币元）
    single_request: 10            # 单次请求告警阈值（人民币元）

# 质量配置
quality:
  auto_fallback: true             # 启用自动降级
  retry_attempts: 3               # 失败重试次数
  quality_check_enabled: true     # 启用质量检查
  
  fallback_chains:                # 降级链
    - primary: "glm-4.5"
      fallback: "glm-4.5-air"
    - primary: "glm-4.5-air"
      fallback: "glm-4-plus"
    - primary: "glm-4-plus" 
      fallback: "glm-4"
    - primary: "gpt-4"
      fallback: "gpt-3.5-turbo"
  # 注意：Agent备用模型映射放在顶层和/或 environments 中配置，这里不重复定义，避免YAML解析与合并混乱。
