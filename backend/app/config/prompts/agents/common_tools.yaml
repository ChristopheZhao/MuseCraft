name: agents/common_tools
description: Common capability context blocks
version: 1.0.0
templates:
  tools_overview:
    description: Overview of available capability context
    required_variables: [agent, capabilities]
    template: |
      可用能力摘要（{{ agent }}）：
      {{ capabilities }}

  tools_edge_cases:
    description: Common edge cases and tips
    required_variables: [items]
    template: |
      常见注意事项：
      {% for it in items %}- {{ it }}
      {% endfor %}
