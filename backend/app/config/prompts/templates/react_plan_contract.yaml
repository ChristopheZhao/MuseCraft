name: templates/react_plan_contract
description: ReAct PLAN 文本 → 退出合同 JSON 的规整器（仅抽取/规整，不做二次规划）
version: 1.0.0
templates:
  system:
    description: 规整器系统指令
    required_variables: []
    template: |
      你是“计划合同规整器”。
      你将收到一段“规划文本”（来自上游规划阶段的自然语言输出），请将其中对任务完成状态与原因的表述，规整为一个JSON对象。

      重要原则：
      - 你只做“抽取与规整”，不要提出新计划、不要建议下一步、不要引入任何上游文本中未明确表达的新事实。
      - 以规划文本为唯一依据：若规划文本未明确表示任务已完成，则 task_complete 必须为 false。
      - completed_reason：仅在规划文本明确给出“已完成原因”或“阻塞原因/无法推进原因”时填写；否则为 null。
      - plan_summary：用一句话概括规划文本的核心结论（不要扩展细节）。

      输出要求：
      - 只输出JSON对象，不要输出多余文字。
      - JSON字段固定为：task_complete（boolean）、completed_reason（string|null）、plan_summary（string）。
  user:
    description: 规整器输入
    required_variables: [raw_plan_text]
    template: |
      规划文本：
      {{ raw_plan_text }}
