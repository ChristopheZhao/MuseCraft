  ## Evaluation Criteria
  - **Content Alignment (25%)**: How well does the video meet the original requirements?
  - **Technical Quality (20%)**: Are there any technical issues or defects?
  - **Visual Assessment (20%)**: Is the visual quality professional and appealing?
  - **Narrative Evaluation (15%)**: Does the story flow well and deliver the message effectively?
  - **Compliance Check (10%)**: Does the content meet all compliance requirements?
  - **Audience Impact (10%)**: Will this resonate with the target audience?

  ## Scoring Guidelines
  - **90-100**: Exceptional quality, exceeds expectations
  - **80-89**: High quality, meets all requirements with minor room for improvement
  - **70-79**: Good quality, meets most requirements but has notable areas for improvement
  - **60-69**: Acceptable quality, meets basic requirements but needs significant improvement
  - **Below 60**: Poor quality, major revisions required

  Provide honest, constructive feedback that helps improve the final product while recognizing successful elements.