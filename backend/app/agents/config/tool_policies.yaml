# 说明：tool_policies 仅用于覆盖/收紧已分配工具的暴露与动作白名单，并非完整清单。
# 未在此列出的工具仍按工具自身可见性生效；最终可用 FC 列表见运行时日志。
agents:
  video_generator:
    video_generation:
      expose: true
      allowed_actions:
        - generate_with_continuity
    image_generation:
      expose: true
      allowed_actions:
        - generate_image
    video_prompt_composer:
      expose: true
      allowed_actions:
        - build_prompt

  image_generator:
    image_prompt_composer:
      expose: true
      allowed_actions:
        - generate

  script_writer:
    # 脚本生成：仅暴露场景脚本生成动作（单条/批量）
    script_generation:
      expose: true
      allowed_actions:
        - generate_scene_script
        - generate_scene_scripts_batch
    # 场景连续性分析：用于基于脚本文本推断场景延续关系
    scene_continuity_analysis_tool:
      expose: true
      allowed_actions:
        - analyze_all_scenes_continuity
    # 角色分析：产出全局角色 + 分场景角色出现（结构化），用于后续一致性
    role_analysis_tool:
      expose: true
      allowed_actions:
        - analyze_roles_and_scenes

  voice_synthesizer:
    voice_synth_tool:
      expose: true
      allowed_actions:
        - synthesize_voice_aligned

  audio_generator:
    file_storage_tool:
      expose: true
      allowed_actions:
        - download_from_url

  video_composer:
    composition_tool:
      expose: true
      allowed_actions:
        - synchronize_audio
        - compose_story_video
    ffmpeg_tool:
      expose: true
      allowed_actions:
        - create_slideshow
    audio_processor:
      expose: true
      allowed_actions:
        - adjust_volume
        - add_fade_effects
        - ensure_duration
