[tool:pytest]
# Integration Test Configuration

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    integration: Integration tests that test component interactions
    e2e: End-to-end tests that test complete user workflows
    performance: Performance and load testing
    load: Load testing with multiple concurrent users
    error_scenarios: Error handling and recovery testing
    deployment: Deployment validation and readiness tests
    monitoring: System monitoring and health check tests
    ci_cd: CI/CD pipeline integration tests
    slow: Tests that take a long time to run
    smoke: Quick smoke tests for basic functionality
    unit: Unit tests (excluded from integration runs)

# Test execution options
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --durations=10
    --maxfail=5
    --disable-warnings
    --color=yes
    --json-report
    --json-report-summary

# Async test support
asyncio_mode = auto

# Coverage configuration (if needed)
# --cov=app
# --cov-report=html:htmlcov
# --cov-report=term-missing
# --cov-fail-under=80

# Timeout configuration
timeout = 300
timeout_method = thread

# Parallel execution (when using pytest-xdist)
# -n auto

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:aioredis
    ignore::pytest.PytestUnraisableExceptionWarning

# Minimum Python version
minversion = 3.8

# Test collection timeout
collect_timeout = 60

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = integration_tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Ignore specific warnings that are expected in test environment
ignore_warnings =
    "ignore:.*database.*:pytest.PytestUnraisableExceptionWarning"
    "ignore:.*event loop.*:pytest.PytestUnraisableExceptionWarning"