services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-short_video_maker}
      POSTGRES_USER: ${DATABASE_USER:-user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-user} -d ${DATABASE_NAME:-short_video_maker}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  migrate:
    build: .
    command: alembic -c alembic.ini upgrade head
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-user}:${DATABASE_PASSWORD:?set DATABASE_PASSWORD in .env}@postgres:5432/${DATABASE_NAME:-short_video_maker}
    depends_on:
      postgres:
        condition: service_healthy

  # FastAPI Application
  api:
    build: .
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-user}:${DATABASE_PASSWORD:?set DATABASE_PASSWORD in .env}@postgres:5432/${DATABASE_NAME:-short_video_maker}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "false"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery_worker:
    build: .
    command: celery -A app.services.celery_app worker --loglevel=info --concurrency=2 --queues=video_processing
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-user}:${DATABASE_PASSWORD:?set DATABASE_PASSWORD in .env}@postgres:5432/${DATABASE_NAME:-short_video_maker}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Celery Beat Scheduler
  celery_beat:
    build: .
    command: celery -A app.services.celery_app beat --loglevel=info
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-user}:${DATABASE_PASSWORD:?set DATABASE_PASSWORD in .env}@postgres:5432/${DATABASE_NAME:-short_video_maker}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Flower (Celery monitoring)
  flower:
    build: .
    command: celery -A app.services.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
