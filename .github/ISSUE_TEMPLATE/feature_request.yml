name: Feature request
description: Propose a scoped capability or contract change.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or system problem should be solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Boundary considerations
      description: Note MAS ownership, tool, memory, provider or migration implications.
