name: Backend Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "tests/**"
      - ".github/workflows/integration-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "tests/**"
      - ".github/workflows/integration-tests.yml"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  DATABASE_URL: "postgresql://test:test@localhost:5432/test_db"
  REDIS_URL: "redis://localhost:6379/0"
  SECRET_KEY: "test-secret-key-for-github-actions-only-not-production"
  PYTHONPATH: "backend:."

jobs:
  backend-tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Runtime Session Unit Tests
            path: backend/tests/unit/test_runtime_session_service.py
            report: runtime-session
          - name: Contract And Prompt Tests
            path: >
              backend/tests/unit/test_react_contract_smoke.py
              backend/tests/unit/test_react_contract_precedence_runtime.py
              backend/tests/unit/test_tool_contracts.py
              backend/tests/unit/test_prompt_safety_rewrite.py
            report: contract-prompt
          - name: System Integration Validation
            path: tests/test_system_integration_validation.py
            report: system-integration
          - name: Deployment Validation
            path: tests/test_deployment_validation.py
            report: deployment
          - name: Monitoring And Health Checks
            path: tests/test_monitoring_and_health_checks.py
            report: monitoring

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync backend dependencies
        run: uv sync --project backend --extra dev --extra test

      - name: Validate environment
        run: |
          uv run --project backend python -c "import sys; print(sys.version)"
          uv run --project backend python -c "import fastapi, sqlalchemy; print(fastapi.__version__, sqlalchemy.__version__)"

      - name: Prepare reports
        run: mkdir -p test_reports

      - name: Run pytest
        run: >
          uv run --project backend pytest ${{ matrix.path }}
          --junitxml=test_reports/${{ matrix.report }}.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-${{ matrix.report }}
          path: test_reports/${{ matrix.report }}.xml
