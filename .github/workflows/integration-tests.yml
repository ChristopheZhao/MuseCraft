name: Backend Release Checks

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/integration-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/integration-tests.yml"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.5.20"
  DATABASE_URL: "postgresql://test:test@localhost:5432/test_db"
  REDIS_URL: "redis://localhost:6379/0"
  SECRET_KEY: "test-secret-key-for-github-actions-only-not-production"
  PYTHONPATH: "backend:."

jobs:
  release-contracts:
    name: Dependencies, Schema, And Release Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install "uv==${UV_VERSION}"

      - name: Sync locked backend dependencies
        run: uv sync --project backend --frozen --extra test

      - name: Verify requirements compatibility export
        run: |
          uv export --project backend --frozen --format requirements-txt --no-hashes --no-emit-project --output-file /tmp/requirements.txt
          tail -n +3 backend/requirements.txt > /tmp/requirements.expected
          tail -n +3 /tmp/requirements.txt > /tmp/requirements.actual
          diff -u /tmp/requirements.expected /tmp/requirements.actual

      - name: Apply and verify PostgreSQL migrations
        run: |
          uv run --project backend alembic -c backend/alembic.ini upgrade head
          uv run --project backend alembic -c backend/alembic.ini check

      - name: Run release contract tests
        run: >-
          uv run --project backend pytest -q
          backend/tests/unit/test_env_loading.py
          backend/tests/unit/test_release_migration_contract.py

  mas-runtime:
    name: MAS Runtime Boundary Regression
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install "uv==${UV_VERSION}"

      - name: Sync locked backend dependencies
        run: uv sync --project backend --frozen --extra test

      - name: Run focused control-plane and runtime tests
        run: >-
          uv run --project backend pytest -q
          backend/tests/unit/test_base_agent_orchestration_report_boundary.py
          backend/tests/unit/test_audio_orchestration_runtime_gate.py
          backend/tests/unit/test_video_generator_progress_boundary.py
          backend/tests/unit/test_script_writer_episode_context.py
          backend/tests/unit/test_published_deliverable_service.py
          backend/tests/unit/test_execution_boundary_assembler_contexts.py
          backend/tests/unit/test_tasks_endpoint.py
          backend/tests/unit/test_orchestrator_runtime_mainline.py
          -k "base_agent_does_not_synthesize_orchestration_report or base_agent_preserves_explicit_orchestration_report or legacy_orchestrator_decision_rejects or image_step_completion or video_step_completion or progress_read_model_uses_accepted_scene_outputs_with_provenance or video_generator_completion_gate or assembler_static_context or partial_result_reports_deterministic_boundary or malformed_scene_scripts_slot or published_payload or continuation_checkpoint_rejects_unknown or publish_script_deliverable or submit_gate_decision_approve or script_revise_resume_projects_candidate_deliverable_into_mas_boundary or rejects_malformed_script_candidate_payload or checkpoint or resume_task_runtime or mainline or runtime"
