name: Frontend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "__tests__/**"
      - "package.json"
      - "package-lock.json"
      - "jest.config.js"
      - "tsconfig*.json"
      - ".github/workflows/frontend-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "__tests__/**"
      - "package.json"
      - "package-lock.json"
      - "jest.config.js"
      - "tsconfig*.json"
      - ".github/workflows/frontend-tests.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"

jobs:
  quality:
    name: Lint And Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run type-check

  jest:
    name: Release Gate Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run release gate tests
        run: npm run test:ci
        env:
          CI: true
          NODE_ENV: test

  smoke:
    name: Browser Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Start application server
        run: |
          npm start &
          for i in {1..30}; do
            curl -fsS http://localhost:3000 >/dev/null && exit 0
            sleep 2
          done
          exit 1
        env:
          NODE_ENV: production
          PORT: 3000

      - name: Run browser smoke
        run: npm run test:smoke
        env:
          CI: true
          TEST_BASE_URL: http://localhost:3000

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: __tests__/screenshots/
          if-no-files-found: ignore
