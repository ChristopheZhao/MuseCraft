name: Frontend Testing Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - '__tests__/**'
      - 'package.json'
      - 'jest.config.js'
      - 'tsconfig.json'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - '__tests__/**'
      - 'package.json'
      - 'jest.config.js'
      - 'tsconfig.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  CACHE_DEPENDENCY_PATH: package-lock.json

jobs:
  # Code Quality and Linting
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Run TypeScript check
        run: npm run type-check
        
      - name: Check formatting
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}"

  # Unit and Integration Tests
  test-unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    
    strategy:
      matrix:
        test-type: [unit, integration]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ${{ matrix.test-type }} tests
        run: npm run test:${{ matrix.test-type }}
        env:
          CI: true
          NODE_ENV: test
          
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: matrix.test-type == 'integration'
        with:
          files: ./coverage/lcov.info
          flags: ${{ matrix.test-type }}
          name: ${{ matrix.test-type }}-coverage
          fail_ci_if_error: false

  # Performance Tests
  test-performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run performance tests
        run: npm run test:performance
        env:
          CI: true
          NODE_ENV: test
          
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: test-results/
          retention-days: 30

  # Accessibility Tests
  test-accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run accessibility tests
        run: npm run test:a11y
        env:
          CI: true
          NODE_ENV: test
          
      - name: Upload accessibility results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-results
          path: test-results/
          retention-days: 30

  # E2E Tests
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test-unit-integration]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
        
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Start application server
        run: |
          npm start &
          sleep 10
          curl -f http://localhost:3000 || exit 1
        env:
          NODE_ENV: production
          PORT: 3000
          
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          TEST_BASE_URL: http://localhost:3000
          
      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            test-results/
            __tests__/screenshots/
          retention-days: 30
          
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # Cross-browser Testing
  test-cross-browser:
    name: Cross-browser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [test-unit-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
        
      - name: Build application
        run: npm run build
        
      - name: Start application server
        run: |
          npm start &
          sleep 10
        env:
          NODE_ENV: production
          PORT: 3000
          
      - name: Run cross-browser tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
          TEST_BASE_URL: http://localhost:3000
          
      - name: Upload browser-specific results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.browser }}-results
          path: test-results/
          retention-days: 7

  # Visual Regression Testing
  test-visual:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-unit-integration]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright
        run: npx playwright install chromium
        
      - name: Build application
        run: npm run build
        
      - name: Start application server
        run: |
          npm start &
          sleep 10
        env:
          NODE_ENV: production
          PORT: 3000
          
      - name: Run visual regression tests
        run: npx playwright test --project=visual-regression
        env:
          CI: true
          TEST_BASE_URL: http://localhost:3000
          
      - name: Upload visual diff results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-regression-diffs
          path: test-results/visual-diffs/
          retention-days: 30

  # Security and Vulnerability Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run security audit
        run: npm audit --audit-level moderate
        
      - name: Run dependency check
        run: npx audit-ci --moderate
        continue-on-error: true

  # Test Results Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs: 
      - test-unit-integration
      - test-performance
      - test-accessibility
      - test-e2e
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate test summary
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          const summary = {
            timestamp: new Date().toISOString(),
            commit: '${{ github.sha }}',
            branch: '${{ github.ref_name }}',
            workflow: '${{ github.workflow }}',
            runId: '${{ github.run_id }}',
            results: {}
          };
          
          // Collect results from artifacts
          const artifactsDir = './artifacts';
          if (fs.existsSync(artifactsDir)) {
            const artifacts = fs.readdirSync(artifactsDir);
            artifacts.forEach(artifact => {
              const artifactPath = path.join(artifactsDir, artifact);
              if (fs.existsSync(path.join(artifactPath, 'test-results.json'))) {
                const result = JSON.parse(fs.readFileSync(path.join(artifactPath, 'test-results.json'), 'utf8'));
                summary.results[artifact] = result.summary;
              }
            });
          }
          
          fs.writeFileSync('test-summary.json', JSON.stringify(summary, null, 2));
          console.log('Test Summary Generated:', JSON.stringify(summary, null, 2));
          "
          
      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let summary = '## 🧪 Test Results Summary\n\n';
            
            try {
              const testSummary = JSON.parse(fs.readFileSync('test-summary.json', 'utf8'));
              
              summary += `**Commit:** ${testSummary.commit.substring(0, 7)}\n`;
              summary += `**Branch:** ${testSummary.branch}\n`;
              summary += `**Timestamp:** ${new Date(testSummary.timestamp).toLocaleString()}\n\n`;
              
              if (Object.keys(testSummary.results).length > 0) {
                summary += '### Test Results\n\n';
                summary += '| Test Type | Total | Passed | Failed | Skipped |\n';
                summary += '|-----------|-------|--------|--------|---------|\n';
                
                Object.entries(testSummary.results).forEach(([type, result]) => {
                  const status = result.failed > 0 ? '❌' : '✅';
                  summary += `| ${status} ${type} | ${result.total} | ${result.passed} | ${result.failed} | ${result.skipped} |\n`;
                });
              }
              
              summary += '\n### Artifacts\n\n';
              summary += '- 📊 [Test Reports](../actions/runs/${{ github.run_id }})\n';
              summary += '- 📈 [Performance Results](../actions/runs/${{ github.run_id }})\n';
              summary += '- ♿ [Accessibility Report](../actions/runs/${{ github.run_id }})\n';
              
            } catch (error) {
              summary += '⚠️ Could not generate detailed summary. Check individual test jobs for results.\n';
            }
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('🧪 Test Results Summary')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: summary
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary
              });
            }
            
      - name: Upload test summary
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: test-summary.json
          retention-days: 90